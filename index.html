    const Icons = {

    function initGridState() {
      const state = {};
      for (let r = 0; r < 6; r++) for (let c = 0; c < 3; c++) state[`${r}-${c}`] = 'white';
      return state;
    }

    function findNumberCoordinates(num) {
      for (let r = 0; r < 6; r++) { const col = NUMBERS_LEFT[r].indexOf(num); if (col !== -1) return { isRight: false, r, c: col }; }
      for (let r = 0; r < 6; r++) { const col = NUMBERS_RIGHT[r].indexOf(num); if (col !== -1) return { isRight: true, r, c: col }; }
      return null;
    }

    function isGreenEligible(cells, r, c) {
      let redsInRow = 0;
      for (let col = 0; col < 3; col++) if (cells[`${r}-${col}`] === 'red') redsInRow++;
      if (redsInRow === 2) return true;
      const blockRowStart = Math.floor(r / 3) * 3;
      let redsInColBlock = 0;
      for (let row = blockRowStart; row < blockRowStart + 3; row++) if (cells[`${row}-${c}`] === 'red') redsInColBlock++;
      return redsInColBlock === 2;
    }

    function refreshGreenStates(cells) {
      const nextCells = { ...cells };
      Object.keys(nextCells).forEach((key) => {
        if (nextCells[key] === 'green') {
          const [r, c] = key.split('-').map(Number);
          if (!isGreenEligible(nextCells, r, c)) nextCells[key] = 'white';
        }
      });
      return nextCells;
    }

    function checkBlockAndApplyGreens(cells, r, c, isRight) {
      let nextCells = { ...cells };
      const blockRowStart = Math.floor(r / 3) * 3;
      let redsInRow = 0;
      for (let col = 0; col < 3; col++) if (nextCells[`${r}-${col}`] === 'red') redsInRow++;
      if (redsInRow === 2) for (let col = 0; col < 3; col++) { const key = `${r}-${col}`; if (nextCells[key] !== 'red' && nextCells[key] !== 'green') nextCells[key] = 'green'; }
      let redsInColBlock = 0;
      for (let row = blockRowStart; row < blockRowStart + 3; row++) if (nextCells[`${row}-${c}`] === 'red') redsInColBlock++;
      if (redsInColBlock === 2) for (let row = blockRowStart; row < blockRowStart + 3; row++) { const key = `${row}-${c}`; if (nextCells[key] !== 'red' && nextCells[key] !== 'green') nextCells[key] = 'green'; }
      return refreshGreenStates(nextCells);
    }

    function getActiveGreenNumbersForBoard(leftCells, rightCells) {
      const greens = new Set();
      Object.entries(leftCells).forEach(([key, color]) => { if (color === 'green') { const [r, c] = key.split('-').map(Number); greens.add(NUMBERS_LEFT[r][c]); } });
      Object.entries(rightCells).forEach(([key, color]) => { if (color === 'green') { const [r, c] = key.split('-').map(Number); greens.add(NUMBERS_RIGHT[r][c]); } });
      return greens;
    }

    function RouletteWheel({ lastDrawnNum, targetNumbers, historyCount }) {
      const canvasRef = useRef(null);
      const lastNumRef = useRef(null);
      const [ballAngle, setBallAngle] = useState(null);
      const [ballRadius, setBallRadius] = useState(65);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
        const R_outer = W/2-4, R_pockets_outer = 90, R_pockets_inner = 72;
        const R_inner_rim = 53, R_center_hub = 22;
        const n = ROUE_ORDER.length;
        const sliceAngle = (2 * Math.PI) / n;
        const startOffset = -Math.PI / 2 - sliceAngle / 2;
        let targetAngle = 0;
        if (lastDrawnNum !== null) {
          const idx = ROUE_ORDER.indexOf(lastDrawnNum);
          targetAngle = startOffset + idx * sliceAngle + sliceAngle / 2;
        }
        const drawWheelFn = (activeAngle, activeRadius) => {
          ctx.clearRect(0, 0, W, H);
          const rimGrad = ctx.createRadialGradient(cx, cy, R_pockets_outer, cx, cy, R_outer);
          rimGrad.addColorStop(0, '#111827'); rimGrad.addColorStop(0.5, '#374151'); rimGrad.addColorStop(1, '#030712');
          ctx.beginPath(); ctx.arc(cx, cy, R_outer, 0, 2*Math.PI); ctx.fillStyle = rimGrad; ctx.fill();
          ROUE_ORDER.forEach((num, i) => {
            const sa = startOffset + i * sliceAngle, ea = sa + sliceAngle, mid = sa + sliceAngle/2;
            const isTarget = targetNumbers.has(num);
            ctx.beginPath();
            ctx.moveTo(cx + R_pockets_inner*Math.cos(sa), cy + R_pockets_inner*Math.sin(sa));
            ctx.lineTo(cx + R_pockets_outer*Math.cos(sa), cy + R_pockets_outer*Math.sin(sa));
            ctx.arc(cx, cy, R_pockets_outer, sa, ea);
            ctx.lineTo(cx + R_pockets_inner*Math.cos(ea), cy + R_pockets_inner*Math.sin(ea));
            ctx.arc(cx, cy, R_pockets_inner, ea, sa, true);
            ctx.closePath();
            let color = '#1f2937';
            if (num === 0) color = '#15803d';
            else if (RED_NUMBERS.includes(num)) color = '#991b1b';
            ctx.fillStyle = color; ctx.fill();
            if (isTarget) { ctx.fillStyle = 'rgba(234,179,8,0.45)'; ctx.fill(); ctx.strokeStyle = '#facc15'; ctx.stroke(); }
            ctx.save();
            const trRadius = R_pockets_inner + (R_pockets_outer - R_pockets_inner)/2;
            ctx.translate(cx + trRadius*Math.cos(mid), cy + trRadius*Math.sin(mid));
            ctx.rotate(mid + Math.PI/2);
            ctx.fillStyle = isTarget ? '#fde047' : '#ffffff';
            ctx.font = 'bold 8px "JetBrains Mono", monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(isTarget ? `★${num}` : `${num}`, 0, 0);
            ctx.restore();
          });
          ctx.beginPath(); ctx.arc(cx, cy, R_center_hub, 0, 2*Math.PI); ctx.fillStyle = '#b45309'; ctx.fill();
          if (lastDrawnNum !== null && activeAngle !== null) {
            const bx = cx + activeRadius*Math.cos(activeAngle), by = cy + activeRadius*Math.sin(activeAngle);
            ctx.beginPath(); ctx.arc(bx, by, 5.5, 0, 2*Math.PI); ctx.fillStyle = '#ffffff'; ctx.fill();
          }
        };
        let animId;
        if (lastDrawnNum !== null && lastDrawnNum !== lastNumRef.current) {
          lastNumRef.current = lastDrawnNum;
          const startTime = performance.now(), duration = 1200;
          const initialAngle = ballAngle !== null ? ballAngle : targetAngle - 3*2*Math.PI;
          const animate = (time) => {
            const elapsed = time - startTime, progress = Math.min(elapsed/duration, 1);
            const easeOut = (t) => 1 - Math.pow(1-t, 3), tEase = easeOut(progress);
            const curAng = initialAngle + (targetAngle - initialAngle)*tEase, curRad = 94 - (94-81)*tEase;
            setBallAngle(curAng); setBallRadius(curRad); drawWheelFn(curAng, curRad);
            if (progress < 1) animId = requestAnimationFrame(animate);
            else { setBallAngle(targetAngle); setBallRadius(81); drawWheelFn(targetAngle, 81); }
          };
          animId = requestAnimationFrame(animate);
        } else {
          drawWheelFn(lastDrawnNum !== null ? targetAngle : null, 81);
        }
        return () => { if (animId) cancelAnimationFrame(animId); };
      }, [lastDrawnNum, targetNumbers, historyCount]);

      return (
        <div className="flex flex-col items-center p-3 rounded-2xl border border-slate-800" style={{background:'rgba(2,6,23,0.25)'}}>
          <canvas ref={canvasRef} width={220} height={220} className="rounded-full shadow-lg border border-slate-900" />
        </div>
      );
    }

    function App() {
      const [capitalInitial, setCapitalInitial] = useState(1000);
      const [globalHistory, setGlobalHistory] = useState([]);
      const [viewMode, setViewMode] = useState('all');
      const [activeTableauIndex, setActiveTableauIndex] = useState(0);
      const [tableaux, setTableaux] = useState([
        { id:0, numero:'Tableau 1', miseUnitaire:5, gainX:36, leftCells:initGridState(), rightCells:initGridState(), lastDrawnNum:null, coups:[] },
        { id:1, numero:'Tableau 2', miseUnitaire:5, gainX:36, leftCells:initGridState(), rightCells:initGridState(), lastDrawnNum:null, coups:[] },
        { id:2, numero:'Tableau 3', miseUnitaire:5, gainX:36, leftCells:initGridState(), rightCells:initGridState(), lastDrawnNum:null, coups:[] }
      ]);

      const frequencies = useMemo(() => {
        const freq = {}; for (let i = 0; i <= 36; i++) freq[i] = 0;
        globalHistory.forEach((num) => { freq[num] = (freq[num]||0) + 1; });
        return freq;
      }, [globalHistory]);

      const topTransversales = useMemo(() => {
        return [...TRANSVERSALES.map((nums) => ({ nums, score: nums.reduce((acc,num) => acc+(frequencies[num]||0), 0) }))]
          .sort((a,b) => b.score-a.score||a.nums[0]-b.nums[0]).slice(0,6);
      }, [frequencies]);

      const recommendedFulls = useMemo(() => {
        const maxFreq = Math.max(...Object.values(frequencies), 1);
        const topTransvNums = new Set(topTransversales.flatMap(t => t.nums));
        const hotNumbers = new Set(Object.entries(frequencies).filter(([n]) => n!=='0').map(([n,count]) => ({num:Number(n),count})).sort((a,b) => b.count-a.count).slice(0,6).map(x => x.num));
        return Array.from({length:37},(_,i)=>i).filter(n => n!==0&&!hotNumbers.has(n))
          .map(num => { const count=frequencies[num]||0, delayIndex=globalHistory.findIndex(v=>v===num), delay=delayIndex===-1?50:delayIndex; return {num,score:delay*2+(1-count/maxFreq)*5+(topTransvNums.has(num)?6:0)}; })
          .sort((a,b)=>b.score-a.score).slice(0,6).map(x=>x.num);
      }, [frequencies, topTransversales, globalHistory]);

      const handleNumberSelected = (num) => {
        const coords = findNumberCoordinates(num);
        setGlobalHistory([num, ...globalHistory]);
        setTableaux(tableaux.map((board) => {
          if (board.id !== activeTableauIndex) return board;
          const previousTargets = getActiveGreenNumbersForBoard(board.leftCells, board.rightCells);
          let updatedLeft = {...board.leftCells}, updatedRight = {...board.rightCells};
          if (coords) {
            const key = `${coords.r}-${coords.c}`;
            const currentVal = coords.isRight ? updatedRight[key] : updatedLeft[key];
            const nextVal = currentVal==='green'?'red':currentVal==='red'?'white':'red';
            if (coords.isRight) { updatedRight[key]=nextVal; updatedRight=checkBlockAndApplyGreens(updatedRight,coords.r,coords.c,true); }
            else { updatedLeft[key]=nextVal; updatedLeft=checkBlockAndApplyGreens(updatedLeft,coords.r,coords.c,false); }
          }
          const nextCoups = [...board.coups];
          if (previousTargets.size > 0) {
            const hasWon=previousTargets.has(num), miseTotal=board.miseUnitaire*previousTargets.size;
            const gainTotal=hasWon?board.miseUnitaire*board.gainX:0, net=gainTotal-miseTotal;
            const currentBalance=capitalInitial+nextCoups.reduce((acc,c)=>acc+c.net,0);
            nextCoups.push({id:Math.random().toString(36).substring(2,9),playedNumbers:Array.from(previousTargets),win:hasWon,winningNumber:num,miseTotal,gainTotal,net,balanceAfter:currentBalance+net});
          }
          return {...board, leftCells:updatedLeft, rightCells:updatedRight, lastDrawnNum:num, coups:nextCoups};
        }));
      };

      const handleGridCellClick = (boardId, isRight, r, c) => {
        setActiveTableauIndex(boardId);
        handleNumberSelected((isRight ? NUMBERS_RIGHT : NUMBERS_LEFT)[r][c]);
      };

      const handleAddLosingCoup = (boardId) => {
        const board = tableaux[boardId];
        const targets = getActiveGreenNumbersForBoard(board.leftCells, board.rightCells);
        if (targets.size === 0) return alert("Aucun numéro vert actif !");
        setTableaux(tableaux.map(b => {
          if (b.id!==boardId) return b;
          const miseTotal=b.miseUnitaire*targets.size, currentBalance=capitalInitial+b.coups.reduce((acc,c)=>acc+c.net,0);
          return {...b, coups:[...b.coups,{id:Math.random().toString(36).substring(2,9),playedNumbers:Array.from(targets),win:false,winningNumber:null,miseTotal,gainTotal:0,net:-miseTotal,balanceAfter:currentBalance-miseTotal}]};
        }));
      };

      const handleResetBoard = (boardId) => {
        if (!confirm("Effacer ce tableau ?")) return;
        setTableaux(tableaux.map(b => b.id===boardId ? {...b,leftCells:initGridState(),rightCells:initGridState(),lastDrawnNum:null,coups:[]} : b));
      };

      const handleUndoCoup = (boardId) => {
        setTableaux(tableaux.map(b => {
          if (b.id!==boardId||b.coups.length===0) return b;
          const dummy=[...b.coups]; dummy.pop(); return {...b,coups:dummy};
        }));
      };

      const handleGlobalReset = () => {
        if (!confirm("Tout effacer ?")) return;
        setGlobalHistory([]);
        setTableaux(tableaux.map(b => ({...b,leftCells:initGridState(),rightCells:initGridState(),lastDrawnNum:null,coups:[]})));
      };

      const handleExportSessionJSON = () => {
        const stateObj = {capitalInitial, globalHistory, tableaux};
        const anchor = document.createElement('a');
        anchor.setAttribute("href", "data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(stateObj,null,2)));
        anchor.setAttribute("download", "roulette_pro_session.json");
        anchor.click();
      };

      const handleImportSessionJSON = (e) => {
        const reader = new FileReader();
        if (e.target.files && e.target.files[0]) {
          reader.readAsText(e.target.files[0]);
          reader.onload = (ev) => {
            try {
              const parsed = JSON.parse(ev.target.result);
              if (parsed && typeof parsed==='object') {
                if (parsed.capitalInitial!==undefined) setCapitalInitial(Number(parsed.capitalInitial));
                if (parsed.globalHistory) setGlobalHistory(parsed.globalHistory);
                if (parsed.tableaux) setTableaux(parsed.tableaux);
                alert("✅ Restauré avec succès !");
              }
            } catch (err) { alert("Erreur."); }
          };
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="border-b border-slate-900 sticky top-0 z-50 shadow-lg flex flex-col items-center justify-between gap-4"
            style={{background:'rgba(15,23,42,0.95)',backdropFilter:'blur(8px)',padding:'12px 16px',flexDirection:'row',flexWrap:'wrap'}}>
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center shadow">
                <Icons.Sparkles className="w-5 h-5 text-white animate-pulse" />
              </div>
              <div>
                <h1 className="text-sm font-black tracking-widest uppercase text-white">Grille Roulette Pro</h1>
                <p style={{fontSize:'10px'}} className="text-slate-500 font-bold uppercase">Application Locale Bureau Autonome</p>
              </div>
            </div>
            <div className="flex items-center gap-2 flex-wrap text-xs font-bold">
              <div className="flex items-center gap-2 rounded-xl px-3 border border-slate-800" style={{background:'#020617',paddingTop:'6px',paddingBottom:'6px'}}>
                <Icons.Coins className="w-3.5 h-3.5 text-emerald-400" />
                <span style={{fontSize:'9px',textTransform:'uppercase',color:'#64748b'}}>Capital :</span>
                <input type="number" value={capitalInitial} onChange={(e) => setCapitalInitial(Number(e.target.value))}
                  style={{width:'64px',background:'transparent',color:'#34d399',textAlign:'right',fontWeight:'bold',outline:'none',border:'none'}} />
                <span className="text-emerald-500">€</span>
              </div>
              <button onClick={handleGlobalReset} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-800 text-slate-400 transition"
                style={{background:'#020617'}}
                onMouseEnter={e=>e.currentTarget.style.color='#f87171'}
                onMouseLeave={e=>e.currentTarget.style.color='#94a3b8'}>
                <Icons.RotateCcw className="w-3.5 h-3.5" /><span>RAZ Globale</span>
              </button>
              <button onClick={handleExportSessionJSON} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-800 text-indigo-400 transition"
                style={{background:'#020617'}}
                onMouseEnter={e=>e.currentTarget.style.color='#fff'}
                onMouseLeave={e=>e.currentTarget.style.color='#818cf8'}>
                <Icons.Download className="w-3.5 h-3.5" /><span>Sauver Session</span>
              </button>
              <label className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-800 text-blue-400 cursor-pointer transition"
                style={{background:'#020617'}}
                onMouseEnter={e=>e.currentTarget.style.color='#fff'}
                onMouseLeave={e=>e.currentTarget.style.color='#60a5fa'}>
                <Icons.Upload className="w-3.5 h-3.5" /><span>Charger Session</span>
                <input type="file" onChange={handleImportSessionJSON} style={{display:'none'}} />
              </label>
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto p-4 flex flex-col gap-6">
            <KeypadTapis onNumberSelect={handleNumberSelected} topTransversales={topTransversales} recommendedFulls={recommendedFulls} frequencies={frequencies} />
            <HistoryTicker history={globalHistory} onClearHistory={() => setGlobalHistory([])} />

            <section className="flex flex-wrap items-center justify-between gap-4 border-b border-slate-900 pb-2 text-xs">
              <div className="flex gap-1 border border-slate-800 p-1 rounded-xl" style={{background:'#020617'}}>
                {['all','0','1','2'].map((v,i) => (
                  <button key={v} onClick={() => { setViewMode(v); if(v!=='all') setActiveTableauIndex(parseInt(v)); }}
                    className="px-3 py-1.5 rounded-lg font-bold transition"
                    style={{background: viewMode===v ? (v==='all'?'#1e293b':'#4f46e5') : 'transparent', color: viewMode===v?'#fff':'#94a3b8'}}>
                    {v==='all'?'Tous':`T${i}`}
                  </button>
                ))}
              </div>
              <div className="text-slate-400 font-bold uppercase tracking-wider" style={{fontSize:'10px'}}>
                Tableau actif : T{activeTableauIndex+1}
              </div>
            </section>

            <section className="flex flex-col gap-6">
              {tableaux.filter(b => viewMode==='all'||viewMode===b.id.toString()).map((board) => {
                const isActive = activeTableauIndex===board.id;
                const targets = getActiveGreenNumbersForBoard(board.leftCells, board.rightCells);
                const totalGain = board.coups.reduce((acc,c) => acc+c.gainTotal, 0);
                const totalSpent = board.coups.reduce((acc,c) => acc+c.miseTotal, 0);
                const curBalance = capitalInitial + (totalGain - totalSpent);
                const diff = curBalance - capitalInitial;

                return (
                  <div key={board.id} onClick={() => setActiveTableauIndex(board.id)}
                    className="rounded-3xl border transition-all cursor-pointer"
                    style={{background:'#0f172a', borderColor: isActive?'#6366f1':'#1e293b', boxShadow: isActive?'0 0 0 2px #1e1b4b, 0 20px 25px -5px rgba(0,0,0,.5)':''}}>
                    <div className="border-b border-slate-800 flex flex-wrap items-center justify-between gap-4 text-xs font-bold" style={{padding:'12px 20px'}}>
                      <div className="flex items-center gap-3">
                        <span className="w-8 h-8 rounded flex items-center justify-center font-mono border border-slate-800" style={{background:'#020617',color:isActive?'#818cf8':'#94a3b8'}}>T{board.id+1}</span>
                        <span className="font-bold text-slate-100">{board.numero}</span>
                        <span className="rounded-full border border-slate-800 text-slate-400" style={{background:'#020617',padding:'2px 8px',fontSize:'10px'}}>{targets.size} vert(s)</span>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className="rounded-lg" style={{background:'#020617',padding:'4px 8px'}}>Mise: {board.miseUnitaire}€</span>
                        <span className="rounded-lg" style={{background:'#020617',padding:'4px 8px'}}>Gain X: {board.gainX}</span>
                        <span className="rounded-lg border font-mono"
                          style={{padding:'4px 10px', background: diff>=0?'rgba(2,44,34,0.20)':'rgba(76,5,25,0.20)', borderColor: diff>=0?'rgba(16,185,129,0.30)':'rgba(244,63,94,0.30)', color: diff>=0?'#34d399':'#fb7185'}}>
                          {curBalance.toFixed(2)} €
                        </span>
                      </div>
                      <div className="flex gap-1.5" style={{fontSize:'10px'}}>
                        <button onClick={(e) => { e.stopPropagation(); handleAddLosingCoup(board.id); }}
                          className="rounded border text-rose-300" style={{padding:'4px 8px',background:'rgba(76,5,25,0.3)',borderColor:'#881337'}}>❌ Perdu</button>
                        <button onClick={(e) => { e.stopPropagation(); handleUndoCoup(board.id); }}
                          className="rounded border border-slate-800 text-slate-400" style={{padding:'4px 8px',background:'#020617'}}>⌫ Annuler</button>
                        <button onClick={(e) => { e.stopPropagation(); handleResetBoard(board.id); }}
                          className="rounded border border-slate-800 text-slate-400" style={{padding:'4px 8px',background:'#020617'}}>RAZ</button>
                      </div>
                    </div>
                    <div className="p-5 flex flex-col gap-6 items-center justify-center" style={{flexDirection:'row',flexWrap:'wrap'}}>
                      <SquaresBoard leftCells={board.leftCells} rightCells={board.rightCells} onCellClick={(isR,r,c) => { e => e.stopPropagation(); handleGridCellClick(board.id,isR,r,c); }} />
                      <RouletteWheel lastDrawnNum={board.lastDrawnNum} targetNumbers={targets} historyCount={globalHistory.length} />
                    </div>
                  </div>
                );
              })}
            </section>
          </main>

          <footer className="border-t border-slate-900 py-6 px-4 mt-12 text-center text-slate-500 text-xs" style={{background:'#020617'}}>
            <p className="font-bold uppercase tracking-widest text-slate-600" style={{fontSize:'9px'}}>Grille de Jeu Roulette Pro V3 - Mode Hors-Ligne Bureau</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
